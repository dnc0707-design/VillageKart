<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VillageKart | Super App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://kit.fontawesome.com/d3697e687e.js" crossorigin="anonymous"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js" type="module"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js" type="module"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js" type="module"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Zen+Dots&display=swap');
        
        :root {
            --primary-blue: #1d4ed8;
            --secondary-blue: #3b82f6;
            --emergency-red: #e11d48;
            --grocery-green: #059669;
            --food-orange: #ea580c;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc;
            color: #0f172a;
        }

        .logo-font { font-family: 'Zen Dots', cursive; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px); }

        .super-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            border: 2px solid transparent;
        }
        
        .tab-active-grocery { background-color: var(--grocery-green) !important; color: white !important; transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgba(5, 150, 105, 0.4); }
        .tab-active-food { background-color: var(--food-orange) !important; color: white !important; transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgba(234, 88, 12, 0.4); }
        .tab-active-ride { background-color: var(--primary-blue) !important; color: white !important; transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgba(29, 78, 216, 0.4); }

        .super-card:active { transform: scale(0.96); }
        .bg-blue-grade { background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%); }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .modal-overlay { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(10px); }

        .header-login-btn {
            background: white;
            color: var(--primary-blue);
            border: 2px solid var(--primary-blue);
            font-size: 0.9rem;
            font-weight: 800;
            transition: all 0.3s ease;
        }
        
        .welcome-badge {
            background: #eff6ff;
            color: var(--primary-blue) !important;
            border-color: var(--primary-blue);
            font-weight: 900 !important;
        }

        .admin-footer-btn {
            color: #475569;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        .admin-footer-btn:hover { color: white; }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="glass sticky top-0 z-50 border-b border-blue-100/50 shadow-sm h-20">
        <div class="max-w-7xl mx-auto px-4 h-full flex items-center justify-between">
            <!-- User Login (Top Left) -->
            <button id="mainLoginBtn" onclick="openAuthModal('login', 'user')" class="header-login-btn px-5 py-2 rounded-full flex items-center gap-2 shadow-sm">
                <i class="fas fa-user-circle"></i>
                <span id="userDisplayName">User Login</span>
            </button>

            <!-- Logo -->
            <div class="flex items-center gap-3 cursor-pointer group" onclick="showPage('home')">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg group-hover:rotate-6 transition-transform">
                    <i class="fas fa-rocket"></i>
                </div>
                <h1 class="text-xl font-normal logo-font text-blue-700 hidden sm:block">VillageKart</h1>
            </div>

            <!-- Cart Icon -->
            <button class="relative bg-slate-900 text-white w-10 h-10 rounded-xl flex items-center justify-center shadow-lg">
                <i class="fas fa-shopping-basket text-sm"></i>
                <span id="cartCount" class="absolute -top-1.5 -right-1.5 bg-blue-600 text-[10px] rounded-full w-5 h-5 flex items-center justify-center border-2 border-white font-900">0</span>
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 md:p-8 min-h-screen">
        
        <!-- HOME SECTION -->
        <section id="homePage" class="space-y-12 pb-24">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <button id="tab-grocery" onclick="switchCategory('Grocery')" class="super-card bg-white p-6 rounded-[2.5rem] border flex flex-col items-center justify-center text-emerald-600 shadow-md">
                    <div class="w-14 h-14 bg-emerald-50 rounded-2xl flex items-center justify-center mb-3"><i class="fas fa-leaf text-2xl"></i></div>
                    <span class="font-900 uppercase text-sm">Grocery</span>
                </button>
                <button id="tab-food" onclick="switchCategory('Food')" class="super-card bg-white p-6 rounded-[2.5rem] border flex flex-col items-center justify-center text-orange-600 shadow-md">
                    <div class="w-14 h-14 bg-orange-50 rounded-2xl flex items-center justify-center mb-3"><i class="fas fa-utensils text-2xl"></i></div>
                    <span class="font-900 uppercase text-sm">Order Food</span>
                </button>
                <button id="tab-ride" onclick="switchCategory('Ride')" class="super-card bg-white p-6 rounded-[2.5rem] border flex flex-col items-center justify-center text-blue-600 shadow-md">
                    <div class="w-14 h-14 bg-blue-50 rounded-2xl flex items-center justify-center mb-3"><i class="fas fa-taxi text-2xl"></i></div>
                    <span class="font-900 uppercase text-sm">Book Ride</span>
                </button>
            </div>

            <div id="marketplace-section" class="space-y-8 pt-4">
                <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 xl:grid-cols-5 gap-8"></div>
            </div>

            <!-- RIDE SECTION: TOTO, BIKE, CAR, AMBULANCE -->
            <div id="ride-section" class="hidden grid grid-cols-1 lg:grid-cols-4 gap-6 pt-4">
                <div onclick="emergencyBooking('Toto')" class="bg-white p-8 rounded-[3rem] border border-slate-200 flex items-center gap-6 hover:border-blue-400 cursor-pointer">
                    <div class="w-14 h-14 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center text-2xl shadow-md"><i class="fas fa-motorcycle"></i></div>
                    <h3 class="font-900 uppercase">Toto Ride</h3>
                </div>
                <div onclick="emergencyBooking('Bike')" class="bg-white p-8 rounded-[3rem] border border-slate-200 flex items-center gap-6 hover:border-blue-400 cursor-pointer">
                    <div class="w-14 h-14 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center text-2xl shadow-md"><i class="fas fa-bicycle"></i></div>
                    <h3 class="font-900 uppercase">Bike Taxi</h3>
                </div>
                <div onclick="emergencyBooking('Car')" class="bg-white p-8 rounded-[3rem] border border-slate-200 flex items-center gap-6 hover:border-blue-400 cursor-pointer">
                    <div class="w-14 h-14 bg-slate-50 text-slate-800 rounded-full flex items-center justify-center text-2xl shadow-md"><i class="fas fa-car"></i></div>
                    <h3 class="font-900 uppercase">Private Car</h3>
                </div>
                <div onclick="emergencyBooking('Ambulance')" class="bg-white p-8 rounded-[3rem] border-4 border-red-100 flex items-center gap-6 emergency-pulse cursor-pointer">
                    <div class="w-14 h-14 bg-red-600 text-white rounded-full flex items-center justify-center text-2xl shadow-lg"><i class="fas fa-ambulance"></i></div>
                    <h3 class="font-900 uppercase text-red-600">Ambulance SOS</h3>
                </div>
            </div>
        </section>

        <!-- ADMIN DASHBOARD -->
        <section id="adminPage" class="hidden animate-in fade-in duration-500">
            <div class="flex flex-col lg:flex-row gap-8">
                <div class="w-full lg:w-80 space-y-4">
                    <div class="bg-white p-8 rounded-[3rem] border text-center shadow-lg">
                        <div class="w-16 h-16 bg-blue-600 rounded-full flex items-center justify-center text-white text-2xl mx-auto mb-4 font-bold">A</div>
                        <h3 class="font-900 uppercase tracking-tighter">System Admin</h3>
                    </div>
                    <div class="bg-white p-3 rounded-[2rem] border shadow-lg flex flex-col gap-1">
                        <button onclick="toggleAdminTab('signup')" id="admin-tab-signup" class="w-full text-left p-4 rounded-xl bg-blue-50 text-blue-600 font-800">Sign Up Partners</button>
                        <button onclick="toggleAdminTab('list')" id="admin-tab-list" class="w-full text-left p-4 rounded-xl text-slate-400 font-800">Partner List</button>
                        <button onclick="toggleAdminTab('reports')" id="admin-tab-reports" class="w-full text-left p-4 rounded-xl text-slate-400 font-800">Orders/Reports</button>
                        <button onclick="logout()" class="w-full text-left p-4 rounded-xl text-red-500 font-800 mt-4">Logout</button>
                    </div>
                </div>
                <div class="flex-1 bg-white p-8 md:p-12 rounded-[4rem] shadow-xl border">
                    <!-- Sign Up Partners Tab -->
                    <div id="admin-signup">
                        <h2 class="text-3xl font-900 mb-8 uppercase tracking-tighter">Partner Registration</h2>
                        <form id="adminRegisterPartnerForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div><label class="text-[10px] font-900 text-slate-400 uppercase tracking-widest block mb-1">Owner Name</label><input type="text" id="apName" required class="w-full bg-slate-50 border p-4 rounded-xl font-800"></div>
                            <div><label class="text-[10px] font-900 text-slate-400 uppercase tracking-widest block mb-1">Mobile (Login ID)</label><input type="tel" id="apPhone" required maxlength="10" class="w-full bg-slate-50 border p-4 rounded-xl font-800"></div>
                            <div><label class="text-[10px] font-900 text-slate-400 uppercase tracking-widest block mb-1">Store / Vehicle Info</label><input type="text" id="apStore" required class="w-full bg-slate-50 border p-4 rounded-xl font-800"></div>
                            <div><label class="text-[10px] font-900 text-slate-400 uppercase tracking-widest block mb-1">Type</label>
                                <select id="apType" class="w-full bg-slate-50 border p-4 rounded-xl font-800"><option value="merchant">Merchant (Store)</option><option value="rider">Rider (Vehicle)</option></select>
                            </div>
                            <div class="col-span-full"><label class="text-[10px] font-900 text-slate-400 uppercase tracking-widest block mb-1">Set Password</label><input type="password" id="apPass" required placeholder="Min 6 chars" class="w-full bg-slate-50 border p-4 rounded-xl font-800"></div>
                            <button type="submit" id="confirmPartnerBtn" class="bg-blue-600 text-white py-5 rounded-2xl font-900 uppercase col-span-full shadow-lg transition-all active:scale-95">Confirm Registration</button>
                        </form>
                    </div>
                    <!-- Partner List Tab -->
                    <div id="admin-list" class="hidden">
                        <h2 class="text-3xl font-900 mb-8 uppercase tracking-tighter">Partner List</h2>
                        <div id="admin-partner-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                    </div>
                    <!-- Management Tab -->
                    <div id="admin-partner-details" class="hidden">
                        <div class="flex items-center gap-4 mb-8">
                            <button onclick="toggleAdminTab('list')" class="text-blue-600 font-900 text-sm">← Back to List</button>
                            <h2 id="managing-partner-name" class="text-2xl font-900 uppercase">Partner</h2>
                        </div>
                        <form id="adminAddProductForm" class="space-y-6 bg-slate-50 p-8 rounded-[3rem] border">
                            <input type="text" id="addPTitle" required placeholder="Product or Service Name" class="w-full bg-white border p-4 rounded-xl font-800">
                            <div class="grid grid-cols-2 gap-4">
                                <input type="number" step="0.01" id="addPPrice" required placeholder="Price ($)" class="w-full bg-white border p-4 rounded-xl font-800">
                                <input type="number" id="addPStock" required placeholder="Stock Qty" class="w-full bg-white border p-4 rounded-xl font-800">
                            </div>
                            <select id="addPCategory" class="w-full bg-white border p-4 rounded-xl font-800"><option>Grocery</option><option>Food</option><option>Ride</option></select>
                            <input type="text" id="addPKeyword" placeholder="Image Keyword (e.g. Apple)" class="w-full bg-white border p-4 rounded-xl font-800">
                            <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-xl font-900 uppercase">Add to Marketplace</button>
                        </form>
                    </div>
                </div>
            </div>
        </section>

        <!-- PARTNER DASHBOARD (Login via Footer) -->
        <section id="partnerPage" class="hidden animate-in fade-in duration-500">
            <div class="flex flex-col lg:flex-row gap-8">
                <div class="w-full lg:w-80 space-y-4">
                    <div class="bg-white p-8 rounded-[3rem] border text-center shadow-lg">
                        <div id="pInitial" class="w-16 h-16 bg-orange-500 rounded-full flex items-center justify-center text-white text-2xl mx-auto mb-4 font-bold">P</div>
                        <h3 id="pShopName" class="font-900 text-lg uppercase truncate">Partner</h3>
                    </div>
                    <div class="bg-white p-3 rounded-[2rem] border shadow-lg flex flex-col gap-1">
                        <button onclick="togglePartnerTab('add')" class="w-full text-left p-4 rounded-xl bg-blue-50 text-blue-600 font-800">My Inventory</button>
                        <button onclick="logout()" class="w-full text-left p-4 rounded-xl text-red-500 font-800 mt-4">Logout</button>
                    </div>
                </div>
                <div class="flex-1 bg-white p-10 rounded-[4rem] shadow-xl border">
                    <div id="p-add-form">
                        <h2 class="text-3xl font-900 mb-8 uppercase tracking-tighter">Inventory Control</h2>
                        <form id="partnerSelfAddForm" class="space-y-6 max-w-xl">
                            <input type="text" id="psTitle" required placeholder="Item Name" class="w-full bg-slate-50 border p-4 rounded-xl font-800">
                            <div class="grid grid-cols-2 gap-4">
                                <input type="number" step="0.01" id="psPrice" required placeholder="Price ($)" class="w-full bg-slate-50 border p-4 rounded-xl font-800">
                                <input type="number" id="psStock" required placeholder="Stock" class="w-full bg-slate-50 border p-4 rounded-xl font-800">
                            </div>
                            <select id="psCategory" class="w-full bg-slate-50 border p-4 rounded-xl font-800"><option>Grocery</option><option>Food</option></select>
                            <button type="submit" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-900 uppercase">Add Item</button>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="bg-slate-900 text-white py-10 px-8 mt-20 rounded-t-[5rem]">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
            <h1 class="text-2xl logo-font text-blue-400">VillageKart</h1>
            <div class="flex gap-10">
                <button onclick="openAuthModal('login', 'admin')" class="admin-footer-btn">Admin Portal</button>
                <button onclick="openAuthModal('login', 'partner')" class="admin-footer-btn">Partner Sign In</button>
            </div>
        </div>
    </footer>

    <!-- AUTH MODAL -->
    <div id="authModal" class="fixed inset-0 modal-overlay z-[100] flex items-center justify-center hidden p-4">
        <div class="bg-white rounded-[4rem] shadow-2xl flex flex-col md:flex-row max-w-4xl w-full overflow-hidden relative animate-in zoom-in duration-300">
            <button onclick="closeAuthModal()" class="absolute right-8 top-8 text-slate-300 hover:text-slate-900 font-900">X</button>
            <div class="bg-blue-grade text-white p-12 md:w-5/12 flex flex-col justify-between">
                <div><h2 id="authTitle" class="text-4xl font-800 logo-font uppercase tracking-tighter">Sign In</h2></div>
                <div class="opacity-20"><i class="fas fa-truck-fast text-[120px]"></i></div>
            </div>
            <div class="p-12 md:w-7/12 bg-white">
                <div id="authContent" class="space-y-4">
                    <div id="loginView">
                        <div class="space-y-4">
                            <input type="text" id="loginId" placeholder="Mobile Number" class="w-full bg-slate-50 border p-4 rounded-xl font-800 outline-none">
                            <input type="password" id="loginPass" placeholder="Password" class="w-full bg-slate-50 border p-4 rounded-xl font-800 outline-none">
                            <button onclick="processLogin()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-900 uppercase mt-2 shadow-lg">Access Portal</button>
                        </div>
                    </div>
                    <div id="registerView" class="hidden space-y-4 text-left">
                        <div><label class="text-[10px] font-900 text-slate-400 uppercase tracking-widest block mb-1">Full Name</label><input type="text" id="regName" class="w-full bg-slate-50 border p-4 rounded-xl font-800"></div>
                        <div><label class="text-[10px] font-900 text-slate-400 uppercase tracking-widest block mb-1">Mobile Number</label><input type="tel" id="regPhone" maxlength="10" class="w-full bg-slate-50 border p-4 rounded-xl font-800"></div>
                        <div><label class="text-[10px] font-900 text-slate-400 uppercase tracking-widest block mb-1">Village & Pincode</label><textarea id="regAddress" class="w-full bg-slate-50 border p-4 rounded-xl font-800 h-20"></textarea></div>
                        <div><label class="text-[10px] font-900 text-slate-400 uppercase tracking-widest block mb-1">Set Password</label><input type="password" id="regPass" class="w-full bg-slate-50 border p-4 rounded-xl font-800"></div>
                        <button onclick="processRegister()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-900 uppercase">Submit Registration</button>
                    </div>
                    <div id="authToggle" class="text-center pt-2"><button onclick="toggleAuthMode()" id="authToggleBtn" class="text-blue-600 font-900 text-xs hover:underline uppercase">New User? Create Account</button></div>
                </div>
                <div id="authSuccessMsg" class="hidden text-center py-10 space-y-4">
                    <div class="w-16 h-16 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto text-3xl"><i class="fas fa-check"></i></div>
                    <h3 class="text-2xl font-900 uppercase">Registration Successful!</h3>
                    <p class="text-slate-400 text-xs font-800 uppercase">Now sign in with your mobile and password.</p>
                    <button onclick="toggleAuthMode()" class="bg-blue-600 text-white px-8 py-3 rounded-xl font-800 text-sm uppercase mt-4">Go to Login</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-12 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-8 py-4 rounded-full shadow-2xl opacity-0 transition-all z-[200] font-800 text-sm">Message</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, addDoc, onSnapshot, query, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyALzu7TNODHkSnb0P-AEaqWWkY83xlKRqs",
            authDomain: "villagekart-live.firebaseapp.com",
            projectId: "villagekart-live",
            storageBucket: "villagekart-live.firebasestorage.app",
            messagingSenderId: "737831986342",
            appId: "1:737831986342:web:a5efd1e5d85be25d770067",
            measurementId: "G-K58E0DDYDJ"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Secondary Auth instance for Admin to create users without being signed out
        const secondaryApp = initializeApp(firebaseConfig, "SecondaryAuth");
        const secondaryAuth = getAuth(secondaryApp);

        const fbId = 'villagekart-v15';
        let userData = null, productUnsub = null, currentPartnerId = null, cartCount = 0;
        let cMode = 'login', cRole = 'user';

        const getEmail = (id, role) => `${id}@${role}.villagekart.app`;

        window.openAuthModal = (m, r) => { cMode = m; cRole = r; document.getElementById('authModal').classList.remove('hidden'); updateAuthUI(); };
        window.closeAuthModal = () => { document.getElementById('authModal').classList.add('hidden'); document.getElementById('authSuccessMsg').classList.add('hidden'); document.getElementById('authContent').classList.remove('hidden'); };
        window.toggleAuthMode = () => { cMode = (cMode === 'login' ? 'register' : 'login'); updateAuthUI(); };

        function updateAuthUI() {
            document.getElementById('authTitle').innerText = (cRole === 'admin' ? 'Admin Portal' : (cRole === 'partner' ? 'Partner Portal' : (cMode === 'login' ? 'Sign In' : 'Sign Up')));
            document.getElementById('loginView').classList.toggle('hidden', cMode !== 'login');
            document.getElementById('registerView').classList.toggle('hidden', cMode !== 'register');
            document.getElementById('authToggle').classList.toggle('hidden', cRole !== 'user');
        }

        window.processLogin = async () => {
            const id = document.getElementById('loginId').value.trim();
            const pass = document.getElementById('loginPass').value;

            if(cRole === 'admin' && id === '7980230656' && pass === '123456') {
                showToast("Admin access granted");
                userData = { role: 'admin', shopName: 'System Admin' };
                showPage('admin'); closeAuthModal(); updateHeader();
                return;
            }

            try {
                await signInWithEmailAndPassword(auth, getEmail(id, cRole), pass);
                closeAuthModal();
            } catch (e) { showToast("Invalid ID or Password"); }
        };

        window.processRegister = async () => {
            const name = document.getElementById('regName').value, id = document.getElementById('regPhone').value.trim(), address = document.getElementById('regAddress').value, pass = document.getElementById('regPass').value;
            if(!name || id.length !== 10) return showToast("Enter correct data");
            try {
                const cr = await createUserWithEmailAndPassword(auth, getEmail(id, 'user'), pass);
                await setDoc(doc(db, 'artifacts', fbId, 'users', cr.user.uid, 'profile', 'data'), { uid: cr.user.uid, id, fullName: name, address, role: 'user' });
                await signOut(auth);
                document.getElementById('authContent').classList.add('hidden');
                document.getElementById('authSuccessMsg').classList.remove('hidden');
            } catch (e) { showToast("ID already exists"); }
        };

        // --- ADMIN: REGISTER PARTNER (FIXED) ---
        document.getElementById('adminRegisterPartnerForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('confirmPartnerBtn');
            btn.innerText = "Processing...";
            btn.disabled = true;

            const name = document.getElementById('apName').value, id = document.getElementById('apPhone').value.trim(), store = document.getElementById('apStore').value, type = document.getElementById('apType').value, pass = document.getElementById('apPass').value;
            
            try {
                // Use secondaryAuth to avoid signing out Admin
                const cr = await createUserWithEmailAndPassword(secondaryAuth, getEmail(id, 'partner'), pass);
                const prof = { uid: cr.user.uid, id, fullName: name, shopName: store, role: 'partner', partnerType: type, joined: new Date().toISOString() };
                await setDoc(doc(db, 'artifacts', fbId, 'users', cr.user.uid, 'profile', 'data'), prof);
                await setDoc(doc(db, 'artifacts', fbId, 'public', 'data', 'partners', cr.user.uid), prof);
                
                // Sign out the newly created partner on secondary instance
                await signOut(secondaryAuth);
                
                showToast("Partner Registered Successfully!");
                e.target.reset();
                toggleAdminTab('list');
            } catch (e) { 
                console.error(e);
                showToast(e.code === 'auth/email-already-in-use' ? "Partner ID already exists" : "Registration Failed"); 
            } finally {
                btn.innerText = "Confirm Registration";
                btn.disabled = false;
            }
        };

        window.toggleAdminTab = (t) => {
            ['signup', 'list', 'reports'].forEach(id => document.getElementById(`admin-${id}`).classList.add('hidden'));
            document.getElementById(`admin-${t}`).classList.remove('hidden');
            document.getElementById('admin-partner-details').classList.add('hidden');
            if(t === 'list') loadPartnerList();
            
            ['signup', 'list', 'reports'].forEach(id => {
                const btn = document.getElementById(`admin-tab-${id}`);
                btn.className = `w-full text-left p-4 rounded-xl font-800 ${t === id ? 'bg-blue-50 text-blue-600' : 'text-slate-400'}`;
            });
        };

        async function loadPartnerList() {
            const grid = document.getElementById('admin-partner-grid');
            onSnapshot(collection(db, 'artifacts', fbId, 'public', 'data', 'partners'), (sn) => {
                grid.innerHTML = "";
                sn.forEach(d => {
                    const p = d.data();
                    const card = document.createElement('div');
                    card.className = "p-6 bg-white border rounded-3xl cursor-pointer hover:border-blue-500 transition-all shadow-sm flex justify-between items-center";
                    card.innerHTML = `<div><div class='font-900 uppercase text-slate-800'>${p.shopName}</div><div class='text-[10px] font-900 text-slate-400 uppercase'>${p.partnerType} • ID: ${p.id}</div></div><i class='fas fa-chevron-right text-slate-200'></i>`;
                    card.onclick = () => managePartner(p);
                    grid.appendChild(card);
                });
            });
        }

        function managePartner(p) {
            currentPartnerId = p.uid;
            document.getElementById('admin-list').classList.add('hidden');
            document.getElementById('admin-partner-details').classList.remove('hidden');
            document.getElementById('managing-partner-name').innerText = p.shopName;
        }

        document.getElementById('adminAddProductForm').onsubmit = async (e) => {
            e.preventDefault();
            await addDoc(collection(db, 'artifacts', fbId, 'public', 'data', 'products'), {
                title: document.getElementById('addPTitle').value,
                price: parseFloat(document.getElementById('addPPrice').value),
                stock: parseInt(document.getElementById('addPStock').value),
                category: document.getElementById('addPCategory').value,
                keyword: document.getElementById('addPKeyword').value || 'item',
                sellerId: currentPartnerId,
                sellerName: document.getElementById('managing-partner-name').innerText
            });
            showToast("Published to Marketplace!"); e.target.reset();
        };

        onAuthStateChanged(auth, async (u) => {
            if(u) {
                const p = await getDoc(doc(db, 'artifacts', fbId, 'users', u.uid, 'profile', 'data'));
                if(p.exists()) {
                    userData = p.data(); updateHeader();
                    if(userData.role === 'partner') {
                        showPage('partner');
                        document.getElementById('pShopName').innerText = userData.shopName;
                        togglePartnerTab('add');
                    }
                }
            } else { updateHeader(); }
        });

        function updateHeader() {
            const btn = document.getElementById('userDisplayName');
            if(userData) {
                btn.innerText = `Welcome ${userData.shopName || userData.fullName}`;
                btn.classList.add('welcome-badge');
            } else { btn.innerText = "User Login"; btn.classList.remove('welcome-badge'); }
        }

        window.togglePartnerTab = (t) => {
            document.getElementById('partner-add-product').classList.toggle('hidden', t !== 'add');
        };

        window.switchCategory = (cat) => {
            document.getElementById('ride-section').classList.toggle('hidden', cat !== 'Ride');
            document.getElementById('marketplace-section').classList.toggle('hidden', cat === 'Ride');
            
            ['Grocery', 'Food', 'Ride'].forEach(c => {
                const btn = document.getElementById(`tab-${c.toLowerCase()}`);
                btn.classList.toggle(`tab-active-${c.toLowerCase()}`, cat === c);
            });
            
            if(cat !== 'Ride') syncMarket(cat);
        };

        function syncMarket(cat) {
            onSnapshot(collection(db, 'artifacts', fbId, 'public', 'data', 'products'), sn => {
                const list = []; sn.forEach(d => { if(d.data().category === cat) list.push(d.data()); });
                const grid = document.getElementById('productGrid');
                if(list.length === 0) grid.innerHTML = `<div class="col-span-full py-20 text-center italic text-slate-300 font-900 uppercase">No products listed in this village.</div>`;
                else grid.innerHTML = list.map(p => `
                    <div class="bg-white p-6 rounded-[2.5rem] border shadow-sm hover:shadow-xl transition-all">
                        <img src="https://source.unsplash.com/featured/?${p.keyword}" class="w-full h-32 object-cover rounded-2xl mb-4">
                        <p class="text-[9px] font-900 text-blue-600 uppercase mb-1">${p.sellerName}</p>
                        <h4 class="font-900 text-slate-800 line-clamp-1">${p.title}</h4>
                        <div class="flex justify-between items-center mt-4 pt-4 border-t">
                            <span class="text-xl font-900">$${p.price}</span>
                            <button onclick="addToCart()" class="w-10 h-10 bg-slate-900 text-white rounded-xl active:scale-90 transition-transform">+</button>
                        </div>
                    </div>
                `).join('');
            });
        }

        window.addToCart = () => { cartCount++; document.getElementById('cartCount').innerText = cartCount; showToast("Added to Cart!"); };
        window.emergencyBooking = (type) => { if(!auth.currentUser) return openAuthModal('login', 'user'); showToast(`Requesting ${type}...`); };
        window.showPage = (p) => {
            document.getElementById('homePage').classList.toggle('hidden', p !== 'home');
            document.getElementById('adminPage').classList.toggle('hidden', p !== 'admin');
            document.getElementById('partnerPage').classList.toggle('hidden', p !== 'partner');
        };

        window.logout = () => { signOut(auth).then(() => { location.reload(); }); };
        const showToast = (m) => { const t = document.getElementById('toast'); t.innerText = m; t.style.opacity = '1'; setTimeout(() => t.style.opacity = '0', 3000); };
        window.onload = () => switchCategory('Grocery');
    </script>
</body>
</html>
